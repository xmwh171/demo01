#========== 服务器端口 ==========
server.port=8080

#========== MySQL连接配置 ==========
spring.datasource.url=jdbc:mysql://localhost:3306/user_center?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
# MySQL用户名
spring.datasource.username=root
# MySQL密码
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== MyBatis-Plus配置 ==========
# mapper文件路径
mybatis-plus.mapper-locations=classpath:mapper/*.xml
# 实体类包路径
mybatis-plus.type-aliases-package=com.example.demofirst.entity
# 下划线转驼峰（比如create_time → createTime）
mybatis-plus.configuration.map-underscore-to-camel-case=true


# ========== 日志级别 ==========
logging.level.root=INFO
logging.level.com.example.demofirst=DEBUG
logging.level.org.mybatis=DEBUG
logging.level.com.baomidou.mybatisplus=DEBUG

mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ========== Redis配置 ==========
# Redis地址（本地默认localhost）
spring.redis.host=localhost
# Redis端口（默认6379）
spring.redis.port=6379
# Redis密码（本地默认无密码，留空即可）
spring.redis.password=
# 使用第0个数据库
spring.redis.database=0
# 连接池配置
# 使用 lettuce 连接池（SpringBoot 默认，性能比 jedis 好）
spring.redis.lettuce.pool.enabled=true
# 最大连接数
spring.redis.lettuce.pool.max-active=8
# 最大空闲连接
spring.redis.lettuce.pool.max-idle=8
# 最小空闲连接
spring.redis.lettuce.pool.min-idle=0
# 获取连接最大等待时间
spring.redis.lettuce.pool.max-wait=1000ms
# 空闲连接清理周期
spring.redis.lettuce.pool.time-between-eviction-runs=60s

# ========== Knife4j接口文档配置 ==========
# 开启接口文档
springdoc.api-docs.enabled=true
# 接口文档接口路径（默认/v3/api-docs）
springdoc.api-docs.path=/v3/api-docs
# 开启Swagger UI界面
springdoc.swagger-ui.enabled=true
# Swagger UI访问路径
springdoc.swagger-ui.path=/swagger-ui.html
# Knife4j增强配置
knife4j.enable=true
# 开启生产环境屏蔽（开发环境设为false，上线设为true）
knife4j.production=false

# 激活环境（dev /test/ prod）
spring.profiles.active=main

# ========== 文件上传配置 ==========
# 单个文件最大大小
spring.servlet.multipart.max-file-size=100MB
# 单次请求最大文件大小
spring.servlet.multipart.max-request-size=200MB
# 超过该大小，文件写入磁盘（否则存在内存）
spring.servlet.multipart.file-size-threshold=10MB
# 显式开启文件上传
spring.servlet.multipart.enabled=true

# ========== 自定义文件存储配置 ==========
#  Linux/Mac存储路径（Windows改为D:\demo01\upload\）
file.upload.path=D:\\TestProgram\\demo01\\upload\\
# 允许上传的文件类型
file.upload.allowed-types=jpg,png,pdf,docx,mp4


